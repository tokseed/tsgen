<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient circle -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#21a038;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="90" fill="url(#bgGradient)" filter="url(#glow)">
    <animate attributeName="r" values="90;92;90" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2">
    <animate attributeName="stroke-dasharray" values="0,500;500,0" dur="2s" fill="freeze" />
  </circle>
  
  <!-- TS letters stylized -->
  <g filter="url(#glow)">
    <!-- T letter -->
    <path d="M65 55 L100 55 L100 65 L87 65 L87 115 L78 115 L78 65 L65 65 Z" fill="white" opacity="0.95">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite" />
    </g>
    
    <!-- S letter stylized as code brackets -->
    <path d="M115 55 L135 55 L135 65 L125 65 L125 80 L135 80 L135 90 L125 90 L125 105 L135 105 L135 115 L115 115 L115 105 L125 105 L125 90 L115 90 L115 80 L125 80 L125 65 L115 65 Z" fill="white" opacity="0.95">
      <animate attributeName="opacity" values="0.95;1;0.95" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </path>
  </g>
  
  <!-- Code brackets decoration -->
  <path d="M50 130 Q45 145 50 160" stroke="url(#codeGradient)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="d" values="M50 130 Q45 145 50 160;M50 128 Q43 145 50 162;M50 130 Q45 145 50 160" dur="3s" repeatCount="indefinite" />
  </path>
  <path d="M150 130 Q155 145 150 160" stroke="url(#codeGradient)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)">
    <animate attributeName="d" values="M150 130 Q155 145 150 160;M150 128 Q157 145 150 162;M150 130 Q155 145 150 160" dur="3s" repeatCount="indefinite" begin="0.5s" />
  </path>
  
  <!-- Sparkles/decorations -->
  <circle cx="40" cy="60" r="3" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="160" cy="70" r="2" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.3s" />
  </circle>
  <circle cx="35" cy="140" r="2.5" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.6s" />
  </circle>
  <circle cx="165" cy="135" r="3" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.9s" />
  </circle>
  
  <!-- AI/Sparkle icon in corner -->
  <g transform="translate(145, 35)">
    <path d="M0 5 L3 12 L10 12 L4 16 L6 23 L0 19 L-6 23 L-4 16 L-10 12 L-3 12 Z" fill="#f1c40f" filter="url(#glow)">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
