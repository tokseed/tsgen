<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sberGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#21a038;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2ecc71;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#27ae60;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f1c40f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f39c12;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="100" cy="100" r="90" />
    </clipPath>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="white" opacity="0.3" />
  <circle cx="100" cy="100" r="90" fill="url(#sberGradient)" filter="url(#glow)">
    <animate attributeName="r" values="90;92;90" dur="3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Outer ring with animation -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2">
    <animate attributeName="stroke-dasharray" values="0,500;500,0" dur="2s" fill="freeze" />
  </circle>
  
  <!-- Sber "C" letter (stylized checkmark) -->
  <g clip-path="url(#circleClip)" filter="url(#glow)">
    <!-- Main C shape -->
    <path d="M100 35 C55 35 35 60 35 100 C35 140 55 165 100 165 C130 165 150 150 160 130 L145 120 C138 135 125 145 100 145 C65 145 55 125 55 100 C55 75 65 55 100 55 C120 55 135 65 142 80 L158 70 C148 50 130 35 100 35Z" fill="white" opacity="0.98">
      <animate attributeName="opacity" values="0.98;1;0.98" dur="2s" repeatCount="indefinite" />
    </path>
    
    <!-- Inner accent -->
    <circle cx="100" cy="100" r="15" fill="white" opacity="0.9">
      <animate attributeName="r" values="15;17;15" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- TS letters in corners -->
  <g filter="url(#glow)">
    <text x="45" y="60" fill="white" fontSize="20" fontWeight="bold" fontFamily="system-ui" opacity="0.9">
      T
    </text>
    <text x="145" y="155" fill="white" fontSize="20" fontWeight="bold" fontFamily="system-ui" opacity="0.9">
      S
    </text>
  </g>
  
  <!-- Code brackets decoration -->
  <path d="M30 100 Q25 115 30 130" stroke="url(#codeGradient)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8">
    <animate attributeName="d" values="M30 100 Q25 115 30 130;M30 98 Q23 115 30 132;M30 100 Q25 115 30 130" dur="3s" repeatCount="indefinite" />
  </path>
  <path d="M170 100 Q175 115 170 130" stroke="url(#codeGradient)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#glow)" opacity="0.8">
    <animate attributeName="d" values="M170 100 Q175 115 170 130;M170 98 Q177 115 170 132;M170 100 Q175 115 170 130" dur="3s" repeatCount="indefinite" begin="0.5s" />
  </path>
  
  <!-- Sparkles -->
  <circle cx="50" cy="50" r="3" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="155" cy="45" r="2.5" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.3s" />
  </circle>
  <circle cx="40" cy="145" r="2" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.6s" />
  </circle>
  <circle cx="160" cy="140" r="3" fill="#f1c40f" filter="url(#glow)">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.9s" />
  </circle>
  
  <!-- AI sparkle icon -->
  <g transform="translate(140, 30)">
    <path d="M0 3 L1.5 7 L6 7 L2.5 9.5 L3.5 14 L0 11 L-3.5 14 L-2.5 9.5 L-6 7 L-1.5 7 Z" fill="#f1c40f" filter="url(#glow)" opacity="0.9">
      <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="10s" repeatCount="indefinite" />
    </path>
  </g>
</svg>
