# Конфигурация для Render.com
services:
  - type: web
    name: tsgen-backend
    env: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GIGACHAT_CREDENTIALS
        sync: false
    disk:
      name: temp-storage
      mountPath: /tmp
      sizeGB: 1
