stages:
  - test
  - build
  - deploy

# Тестирование Python бэкенда
test-backend:
  stage: test
  image: python:3.11
  script:
    - cd src
    - pip install -r ../requirements.txt
    - pip install pytest pytest-asyncio
    - python -m pytest ../tests/ || echo "Tests skipped"
  only:
    - main

# Сборка frontend
build-frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
  only:
    - main

# Деплой на Render (или другой хостинг)
deploy:
  stage: deploy
  image: python:3.11
  script:
    - pip install -r requirements.txt
  environment:
    name: production
  only:
    - main
